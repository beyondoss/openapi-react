name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: install:ts
        run: mise run install:ts
      - name: check:fmt
        run: mise run check:fmt
      - name: check:types
        run: mise run check:types
      - name: test
        run: mise run test
      - name: build
        run: mise run build
